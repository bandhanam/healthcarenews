<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Heart monitor -->
  <g transform="translate(250,50)">
    <rect x="0" y="0" width="400" height="250" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="15" y="15" width="370" height="180" rx="8" fill="#0f172a"/>
    <!-- ECG line -->
    <polyline points="30,110 80,110 100,110 115,70 125,150 140,60 150,130 165,110 250,110 270,110 285,75 295,145 310,65 320,125 335,110 370,110"
      stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Grid -->
    <g stroke="#1a7f64" stroke-opacity="0.1" stroke-width="0.5">
      <line x1="15" y1="55" x2="385" y2="55"/><line x1="15" y1="95" x2="385" y2="95"/>
      <line x1="15" y1="135" x2="385" y2="135"/><line x1="15" y1="175" x2="385" y2="175"/>
    </g>
    <!-- BPM display -->
    <text x="340" y="45" font-size="14" fill="#22c55e" font-weight="700" font-family="monospace">72</text>
    <text x="340" y="58" font-size="8" fill="#22c55e" font-family="monospace" fill-opacity="0.6">BPM</text>
    <!-- SpO2 -->
    <text x="30" y="45" font-size="10" fill="#3b82f6" font-weight="600" font-family="monospace">SpO2: 98%</text>
    <!-- Bottom controls -->
    <circle cx="100" cy="225" r="8" fill="#475569"/>
    <circle cx="200" cy="225" r="8" fill="#475569"/>
    <circle cx="300" cy="225" r="8" fill="#ef4444" fill-opacity="0.6"/>
  </g>
  <!-- Stethoscope -->
  <g transform="translate(100,180)" stroke="#475569" stroke-width="3" fill="none" stroke-opacity="0.2">
    <path d="M0,0 Q0,60 30,80 Q60,100 60,140"/>
    <circle cx="60" cy="158" r="18" stroke-width="3"/>
    <circle cx="60" cy="158" r="8" fill="#475569" fill-opacity="0.1"/>
  </g>
  <!-- Robotic arm hint -->
  <g transform="translate(720,100)" stroke="#94a3b8" stroke-width="2" fill="none" stroke-opacity="0.2">
    <rect x="0" y="0" width="40" height="40" rx="4"/>
    <line x1="20" y1="40" x2="20" y2="80"/>
    <line x1="20" y1="80" x2="50" y2="120"/>
    <circle cx="50" cy="120" r="6"/>
  </g>
</svg>
