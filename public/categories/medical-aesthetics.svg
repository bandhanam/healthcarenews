<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf2f8"/><stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Face outline -->
  <g transform="translate(350,40)">
    <ellipse cx="100" cy="160" rx="85" ry="110" fill="white" fill-opacity="0.6" stroke="#ec4899" stroke-width="2" stroke-opacity="0.3"/>
    <!-- Eyes -->
    <ellipse cx="70" cy="135" rx="16" ry="8" fill="none" stroke="#64748b" stroke-width="1.5" stroke-opacity="0.4"/>
    <ellipse cx="130" cy="135" rx="16" ry="8" fill="none" stroke="#64748b" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle cx="70" cy="135" r="4" fill="#64748b" fill-opacity="0.3"/>
    <circle cx="130" cy="135" r="4" fill="#64748b" fill-opacity="0.3"/>
    <!-- Nose -->
    <path d="M95,155 Q100,175 105,155" stroke="#64748b" stroke-width="1.2" fill="none" stroke-opacity="0.3"/>
    <!-- Lips -->
    <path d="M78,195 Q100,185 122,195" stroke="#ec4899" stroke-width="1.5" fill="none" stroke-opacity="0.35"/>
    <path d="M78,195 Q100,210 122,195" stroke="#ec4899" stroke-width="1.5" fill="none" stroke-opacity="0.25"/>
    <!-- Sparkles for aesthetic treatment -->
    <g fill="#f59e0b" fill-opacity="0.3">
      <polygon points="60,100 62,95 64,100 69,102 64,104 62,109 60,104 55,102"/>
      <polygon points="140,100 142,96 144,100 148,102 144,104 142,108 140,104 136,102" transform="scale(0.8) translate(30,20)"/>
    </g>
  </g>
  <!-- Syringe (cosmetic injection) -->
  <g transform="translate(600,100) rotate(-25)">
    <rect x="8" y="0" width="10" height="6" rx="2" fill="#94a3b8"/>
    <rect x="11" y="6" width="4" height="40" fill="#b0bec5"/>
    <rect x="6" y="46" width="14" height="100" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="8" y="80" width="10" height="64" rx="2" fill="#ec4899" fill-opacity="0.2"/>
    <rect x="9" y="146" width="8" height="8" rx="2" fill="#94a3b8"/>
    <line x1="13" y1="154" x2="13" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Cream jar -->
  <g transform="translate(140,220)">
    <rect x="10" y="0" width="70" height="16" rx="4" fill="#ec4899" fill-opacity="0.3"/>
    <rect x="5" y="16" width="80" height="60" rx="10" fill="white" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.25"/>
    <text x="45" y="52" text-anchor="middle" font-size="10" fill="#ec4899" font-weight="600" font-family="sans-serif" fill-opacity="0.5">CARE</text>
  </g>
  <!-- Leaf/natural element -->
  <g transform="translate(720,280)" fill="#1a7f64" fill-opacity="0.1">
    <path d="M0,30 Q15,-10 40,0 Q15,15 0,30 Z"/>
    <line x1="0" y1="30" x2="20" y2="10" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.15"/>
  </g>
</svg>
