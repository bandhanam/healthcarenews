<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef7f3"/><stop offset="100%" stop-color="#dff0ea"/>
    </linearGradient>
    <linearGradient id="liq1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22a57f" stop-opacity="0.4"/><stop offset="100%" stop-color="#1a7f64" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="liq2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Pill bottle -->
  <g transform="translate(200,60)">
    <rect x="10" y="0" width="60" height="24" rx="5" fill="#1a7f64"/><rect x="14" y="18" width="52" height="8" rx="3" fill="#14614d"/>
    <rect x="12" y="28" width="56" height="180" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="18" y="46" width="44" height="60" rx="4" fill="white" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="30" y="58" width="8" height="30" rx="2" fill="#1a7f64" fill-opacity="0.4"/>
    <rect x="18" y="68" width="44" height="10" rx="2" fill="#1a7f64" fill-opacity="0.4"/>
    <rect x="20" y="120" width="40" height="4" rx="2" fill="#94a3b8" fill-opacity="0.3"/>
    <rect x="20" y="130" width="30" height="4" rx="2" fill="#94a3b8" fill-opacity="0.25"/>
    <rect x="20" y="140" width="35" height="4" rx="2" fill="#94a3b8" fill-opacity="0.2"/>
  </g>
  <!-- Medicine bottle with liquid -->
  <g transform="translate(380,80)">
    <rect x="22" y="0" width="36" height="16" rx="4" fill="#94a3b8"/>
    <rect x="18" y="12" width="44" height="8" rx="2" fill="#64748b"/>
    <rect x="20" y="20" width="40" height="18" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="10" y="38" width="60" height="160" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="14" y="100" width="52" height="94" rx="6" fill="url(#liq1)"/>
    <rect x="18" y="52" width="44" height="35" rx="3" fill="white" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="40" y="72" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="700" font-family="sans-serif">Rx</text>
    <line x1="62" y1="110" x2="70" y2="110" stroke="#94a3b8" stroke-width="1"/>
    <line x1="62" y1="130" x2="70" y2="130" stroke="#94a3b8" stroke-width="1"/>
    <line x1="62" y1="150" x2="70" y2="150" stroke="#94a3b8" stroke-width="1"/>
    <line x1="62" y1="170" x2="70" y2="170" stroke="#94a3b8" stroke-width="1"/>
  </g>
  <!-- Blister pack -->
  <g transform="translate(560,100)">
    <rect x="0" y="0" width="120" height="160" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
    <g fill="#f8fafc" stroke="#94a3b8" stroke-width="1">
      <circle cx="25" cy="30" r="14"/><circle cx="60" cy="30" r="14"/><circle cx="95" cy="30" r="14"/>
      <circle cx="25" cy="65" r="14"/><circle cx="60" cy="65" r="14"/><circle cx="95" cy="65" r="14"/>
      <circle cx="25" cy="100" r="14"/><circle cx="60" cy="100" r="14"/><circle cx="95" cy="100" r="14"/>
      <circle cx="25" cy="135" r="14"/><circle cx="60" cy="135" r="14"/><circle cx="95" cy="135" r="14"/>
    </g>
    <!-- Some pills popped -->
    <circle cx="25" cy="30" r="14" fill="#94a3b8" fill-opacity="0.15"/>
    <circle cx="60" cy="30" r="14" fill="#94a3b8" fill-opacity="0.15"/>
    <circle cx="25" cy="65" r="14" fill="#94a3b8" fill-opacity="0.15"/>
  </g>
  <!-- Scattered pills -->
  <g transform="translate(740,260) rotate(-15)"><rect x="0" y="0" width="32" height="14" rx="7" fill="#ef4444" fill-opacity="0.5"/><rect x="16" y="0" width="16" height="14" rx="7" fill="#fbbf24" fill-opacity="0.5"/></g>
  <circle cx="160" cy="320" r="10" fill="#3b82f6" fill-opacity="0.2"/>
  <g transform="translate(800,140) rotate(20)"><rect x="0" y="0" width="28" height="12" rx="6" fill="#1a7f64" fill-opacity="0.3"/><rect x="14" y="0" width="14" height="12" rx="6" fill="#f1f5f9" fill-opacity="0.8"/></g>
  <circle cx="320" cy="340" r="8" fill="#f59e0b" fill-opacity="0.25"/>
</svg>
