<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef7f3"/><stop offset="100%" stop-color="#dff0ea"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Globe -->
  <g transform="translate(370,60)">
    <circle cx="80" cy="80" r="78" fill="none" stroke="#1a7f64" stroke-width="2" stroke-opacity="0.2"/>
    <circle cx="80" cy="80" r="78" fill="#1a7f64" fill-opacity="0.03"/>
    <!-- Latitude lines -->
    <ellipse cx="80" cy="80" rx="78" ry="30" fill="none" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.08"/>
    <ellipse cx="80" cy="80" rx="78" ry="55" fill="none" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.08"/>
    <!-- Longitude lines -->
    <ellipse cx="80" cy="80" rx="30" ry="78" fill="none" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.08"/>
    <line x1="80" y1="2" x2="80" y2="158" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.08"/>
    <!-- Health markers on globe -->
    <circle cx="50" cy="55" r="6" fill="#ef4444" fill-opacity="0.2"/><circle cx="50" cy="55" r="2.5" fill="#ef4444" fill-opacity="0.3"/>
    <circle cx="110" cy="70" r="6" fill="#3b82f6" fill-opacity="0.2"/><circle cx="110" cy="70" r="2.5" fill="#3b82f6" fill-opacity="0.3"/>
    <circle cx="75" cy="100" r="6" fill="#1a7f64" fill-opacity="0.2"/><circle cx="75" cy="100" r="2.5" fill="#1a7f64" fill-opacity="0.3"/>
    <circle cx="100" cy="45" r="5" fill="#f59e0b" fill-opacity="0.2"/><circle cx="100" cy="45" r="2" fill="#f59e0b" fill-opacity="0.3"/>
  </g>
  <!-- People silhouettes -->
  <g transform="translate(120,200)" fill="#1e3a5f" fill-opacity="0.1">
    <circle cx="20" cy="0" r="12"/><rect x="8" y="14" width="24" height="50" rx="8"/>
    <circle cx="60" cy="-5" r="12"/><rect x="48" y="9" width="24" height="50" rx="8"/>
    <circle cx="100" cy="3" r="12"/><rect x="88" y="17" width="24" height="50" rx="8"/>
  </g>
  <g transform="translate(650,180)" fill="#1a7f64" fill-opacity="0.08">
    <circle cx="20" cy="0" r="12"/><rect x="8" y="14" width="24" height="50" rx="8"/>
    <circle cx="60" cy="-8" r="12"/><rect x="48" y="6" width="24" height="50" rx="8"/>
    <circle cx="100" cy="5" r="12"/><rect x="88" y="19" width="24" height="50" rx="8"/>
  </g>
  <!-- Shield with cross -->
  <g transform="translate(400,220)">
    <path d="M50,0 L100,20 L100,65 C100,105 50,130 50,130 C50,130 0,105 0,65 L0,20 Z" fill="#1a7f64" fill-opacity="0.06" stroke="#1a7f64" stroke-width="2" stroke-opacity="0.15"/>
    <rect x="42" y="35" width="16" height="55" rx="4" fill="#1a7f64" fill-opacity="0.12"/>
    <rect x="22" y="55" width="56" height="16" rx="4" fill="#1a7f64" fill-opacity="0.12"/>
  </g>
  <!-- WHO text hint -->
  <text x="450" y="380" text-anchor="middle" font-size="10" fill="#1a7f64" fill-opacity="0.12" font-weight="700" font-family="sans-serif" letter-spacing="0.2em">WORLD HEALTH</text>
</svg>
