<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef7f3"/><stop offset="100%" stop-color="#dff0ea"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- DNA Double Helix -->
  <g transform="translate(300,30) scale(1.1)">
    <!-- Left strand -->
    <path d="M100,0 C140,40 160,80 140,120 C120,160 80,200 100,240 C120,280 160,320 140,340" stroke="#1a7f64" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M200,0 C160,40 140,80 160,120 C180,160 220,200 200,240 C180,280 140,320 160,340" stroke="#22a57f" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Rungs -->
    <line x1="115" y1="30" x2="185" y2="30" stroke="#1a7f64" stroke-width="3" stroke-opacity="0.4"/>
    <line x1="130" y1="60" x2="170" y2="60" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="145" y1="90" x2="155" y2="90" stroke="#ef4444" stroke-width="3" stroke-opacity="0.4"/>
    <line x1="135" y1="120" x2="165" y2="120" stroke="#f59e0b" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="110" y1="150" x2="190" y2="150" stroke="#1a7f64" stroke-width="3" stroke-opacity="0.4"/>
    <line x1="95" y1="180" x2="205" y2="180" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="105" y1="210" x2="195" y2="210" stroke="#ef4444" stroke-width="3" stroke-opacity="0.4"/>
    <line x1="120" y1="240" x2="180" y2="240" stroke="#f59e0b" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="140" y1="270" x2="160" y2="270" stroke="#1a7f64" stroke-width="3" stroke-opacity="0.4"/>
    <line x1="130" y1="300" x2="170" y2="300" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.5"/>
    <!-- Base pair labels -->
    <text x="96" y="34" font-size="10" fill="#1a7f64" font-weight="700" font-family="sans-serif">A</text>
    <text x="190" y="34" font-size="10" fill="#1a7f64" font-weight="700" font-family="sans-serif">T</text>
    <text x="115" y="64" font-size="10" fill="#3b82f6" font-weight="700" font-family="sans-serif">G</text>
    <text x="175" y="64" font-size="10" fill="#3b82f6" font-weight="700" font-family="sans-serif">C</text>
    <text x="78" y="184" font-size="10" fill="#3b82f6" font-weight="700" font-family="sans-serif">C</text>
    <text x="210" y="184" font-size="10" fill="#3b82f6" font-weight="700" font-family="sans-serif">G</text>
  </g>
  <!-- Floating nucleotides -->
  <circle cx="120" cy="100" r="18" fill="#1a7f64" fill-opacity="0.08"/><text x="120" y="105" text-anchor="middle" font-size="12" fill="#1a7f64" font-weight="700" font-family="sans-serif">A</text>
  <circle cx="780" cy="80" r="18" fill="#3b82f6" fill-opacity="0.08"/><text x="780" y="85" text-anchor="middle" font-size="12" fill="#3b82f6" font-weight="700" font-family="sans-serif">G</text>
  <circle cx="750" cy="300" r="18" fill="#ef4444" fill-opacity="0.08"/><text x="750" y="305" text-anchor="middle" font-size="12" fill="#ef4444" font-weight="700" font-family="sans-serif">T</text>
  <circle cx="150" cy="310" r="18" fill="#f59e0b" fill-opacity="0.08"/><text x="150" y="315" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="700" font-family="sans-serif">C</text>
  <!-- CRISPR scissors icon -->
  <g transform="translate(680,160) scale(1.5)" stroke="#1a7f64" stroke-width="2" fill="none" stroke-opacity="0.3">
    <path d="M0,0 C8,-8 16,-8 20,0 C24,8 16,16 8,12"/>
    <path d="M0,24 C8,32 16,32 20,24 C24,16 16,8 8,12"/>
    <line x1="20" y1="0" x2="40" y2="-10"/>
    <line x1="20" y1="24" x2="40" y2="34"/>
  </g>
</svg>
