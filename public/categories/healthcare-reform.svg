<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef2f7"/><stop offset="100%" stop-color="#e0e8f0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Clipboard -->
  <g transform="translate(320,30)">
    <rect x="20" y="30" width="220" height="310" rx="12" fill="white" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="80" y="15" width="100" height="30" rx="8" fill="#1e3a5f"/>
    <circle cx="130" cy="30" r="8" fill="#e2e8f0"/>
    <!-- Lines on clipboard -->
    <rect x="50" y="80" width="160" height="8" rx="4" fill="#1a7f64" fill-opacity="0.15"/>
    <rect x="50" y="105" width="120" height="8" rx="4" fill="#1e3a5f" fill-opacity="0.1"/>
    <rect x="50" y="130" width="140" height="8" rx="4" fill="#1a7f64" fill-opacity="0.12"/>
    <rect x="50" y="155" width="100" height="8" rx="4" fill="#1e3a5f" fill-opacity="0.1"/>
    <!-- Checkboxes -->
    <rect x="50" y="190" width="16" height="16" rx="3" fill="white" stroke="#1a7f64" stroke-width="1.5"/>
    <path d="M53,198 L57,203 L63,193" stroke="#1a7f64" stroke-width="2" fill="none"/>
    <rect x="75" y="192" width="100" height="8" rx="4" fill="#64748b" fill-opacity="0.15"/>
    <rect x="50" y="220" width="16" height="16" rx="3" fill="white" stroke="#1a7f64" stroke-width="1.5"/>
    <path d="M53,228 L57,233 L63,223" stroke="#1a7f64" stroke-width="2" fill="none"/>
    <rect x="75" y="222" width="80" height="8" rx="4" fill="#64748b" fill-opacity="0.15"/>
    <rect x="50" y="250" width="16" height="16" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="75" y="252" width="120" height="8" rx="4" fill="#64748b" fill-opacity="0.1"/>
    <!-- Signature line -->
    <line x1="50" y1="310" x2="200" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="125" y="326" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif">Signature</text>
  </g>
  <!-- Gavel -->
  <g transform="translate(640,120)" fill-opacity="0.15">
    <rect x="0" y="60" width="60" height="20" rx="4" fill="#1e3a5f"/>
    <rect x="15" y="0" width="30" height="65" rx="6" fill="#1e3a5f"/>
    <rect x="-10" y="80" width="80" height="10" rx="3" fill="#1e3a5f"/>
  </g>
  <!-- Medical cross -->
  <g transform="translate(140,150)" fill="#1a7f64" fill-opacity="0.07">
    <rect x="12" y="0" width="16" height="40" rx="4"/><rect x="0" y="12" width="40" height="16" rx="4"/>
  </g>
</svg>
