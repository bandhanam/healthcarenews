<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef7f3"/><stop offset="100%" stop-color="#dff0ea"/>
    </linearGradient>
    <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22a57f" stop-opacity="0.5"/><stop offset="100%" stop-color="#1a7f64" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Vaccine vial -->
  <g transform="translate(300,60)">
    <rect x="30" y="0" width="40" height="18" rx="4" fill="#d97706"/>
    <circle cx="50" cy="8" r="10" fill="#475569"/>
    <rect x="34" y="14" width="32" height="10" rx="2" fill="#f59e0b"/>
    <rect x="34" y="24" width="32" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="20" y="44" width="60" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="24" y="120" width="52" height="100" rx="8" fill="url(#liq)"/>
    <rect x="30" y="60" width="40" height="40" rx="4" fill="white" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.3"/>
    <text x="50" y="75" text-anchor="middle" font-size="8" fill="#1a7f64" font-weight="700" font-family="sans-serif">COVID</text>
    <text x="50" y="88" text-anchor="middle" font-size="7" fill="#64748b" font-family="sans-serif">mRNA</text>
    <line x1="72" y1="130" x2="80" y2="130" stroke="#94a3b8" stroke-width="1"/>
    <line x1="72" y1="155" x2="80" y2="155" stroke="#94a3b8" stroke-width="1"/>
    <line x1="72" y1="180" x2="80" y2="180" stroke="#94a3b8" stroke-width="1"/>
    <line x1="72" y1="205" x2="80" y2="205" stroke="#94a3b8" stroke-width="1"/>
  </g>
  <!-- Large syringe -->
  <g transform="translate(500,30) rotate(10)">
    <rect x="20" y="0" width="18" height="10" rx="3" fill="#94a3b8"/>
    <rect x="25" y="10" width="8" height="80" fill="#b0bec5"/>
    <rect x="18" y="90" width="22" height="180" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="20" y="160" width="18" height="108" rx="4" fill="url(#liq)"/>
    <line x1="16" y1="120" x2="20" y2="120" stroke="#94a3b8" stroke-width="1"/>
    <line x1="16" y1="145" x2="20" y2="145" stroke="#94a3b8" stroke-width="1"/>
    <line x1="16" y1="170" x2="20" y2="170" stroke="#94a3b8" stroke-width="1"/>
    <line x1="16" y1="195" x2="20" y2="195" stroke="#94a3b8" stroke-width="1"/>
    <line x1="16" y1="220" x2="20" y2="220" stroke="#94a3b8" stroke-width="1"/>
    <line x1="16" y1="245" x2="20" y2="245" stroke="#94a3b8" stroke-width="1"/>
    <rect x="23" y="270" width="12" height="14" rx="3" fill="#94a3b8"/>
    <line x1="29" y1="284" x2="29" y2="340" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Shield with checkmark -->
  <g transform="translate(160,140)">
    <path d="M40,0 L80,15 L80,55 C80,90 40,110 40,110 C40,110 0,90 0,55 L0,15 Z" fill="#1a7f64" fill-opacity="0.1" stroke="#1a7f64" stroke-width="2" stroke-opacity="0.25"/>
    <path d="M22,55 L35,68 L60,40" stroke="#1a7f64" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.4"/>
  </g>
  <!-- Band-aid -->
  <g transform="translate(700,250) rotate(-30)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
    <rect x="28" y="0" width="24" height="30" rx="2" fill="#fbbf24" fill-opacity="0.12"/>
    <circle cx="36" cy="12" r="2" fill="#d97706" fill-opacity="0.2"/>
    <circle cx="44" cy="12" r="2" fill="#d97706" fill-opacity="0.2"/>
    <circle cx="36" cy="20" r="2" fill="#d97706" fill-opacity="0.2"/>
    <circle cx="44" cy="20" r="2" fill="#d97706" fill-opacity="0.2"/>
  </g>
</svg>
