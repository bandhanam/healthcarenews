<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="liq1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="liq2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a7f64" stop-opacity="0.3"/><stop offset="100%" stop-color="#14614d" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="liq3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/><stop offset="100%" stop-color="#d97706" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Test tube rack -->
  <g transform="translate(240,60)">
    <!-- Rack -->
    <rect x="0" y="20" width="420" height="12" rx="4" fill="#94a3b8" fill-opacity="0.2"/>
    <rect x="0" y="240" width="420" height="12" rx="4" fill="#94a3b8" fill-opacity="0.2"/>
    <rect x="10" y="20" width="8" height="232" fill="#94a3b8" fill-opacity="0.15"/>
    <rect x="402" y="20" width="8" height="232" fill="#94a3b8" fill-opacity="0.15"/>
    <!-- Test tube 1 -->
    <g transform="translate(60,0)">
      <rect x="0" y="0" width="30" height="220" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="2" y="100" width="26" height="118" rx="13" fill="url(#liq1)"/>
      <rect x="-4" y="-8" width="38" height="12" rx="3" fill="#3b82f6" fill-opacity="0.3"/>
    </g>
    <!-- Test tube 2 -->
    <g transform="translate(130,0)">
      <rect x="0" y="0" width="30" height="220" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="2" y="130" width="26" height="88" rx="13" fill="url(#liq2)"/>
      <rect x="-4" y="-8" width="38" height="12" rx="3" fill="#1a7f64" fill-opacity="0.3"/>
    </g>
    <!-- Test tube 3 -->
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="30" height="220" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="2" y="80" width="26" height="138" rx="13" fill="url(#liq3)"/>
      <rect x="-4" y="-8" width="38" height="12" rx="3" fill="#f59e0b" fill-opacity="0.3"/>
    </g>
    <!-- Test tube 4 -->
    <g transform="translate(270,0)">
      <rect x="0" y="0" width="30" height="220" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="2" y="150" width="26" height="68" rx="13" fill="url(#liq1)"/>
      <rect x="-4" y="-8" width="38" height="12" rx="3" fill="#3b82f6" fill-opacity="0.2"/>
    </g>
    <!-- Test tube 5 -->
    <g transform="translate(340,0)">
      <rect x="0" y="0" width="30" height="220" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="2" y="110" width="26" height="108" rx="13" fill="url(#liq2)"/>
      <rect x="-4" y="-8" width="38" height="12" rx="3" fill="#1a7f64" fill-opacity="0.3"/>
    </g>
  </g>
  <!-- Phase labels -->
  <g transform="translate(260,330)" font-size="10" fill="#64748b" font-family="sans-serif" fill-opacity="0.4">
    <text x="70" y="0" text-anchor="middle">Phase I</text>
    <text x="140" y="0" text-anchor="middle">Phase II</text>
    <text x="210" y="0" text-anchor="middle">Phase III</text>
    <text x="280" y="0" text-anchor="middle">Phase IV</text>
  </g>
  <!-- Clipboard -->
  <g transform="translate(100,160)" fill-opacity="0.1">
    <rect x="0" y="10" width="60" height="80" rx="6" fill="#1e3a5f" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.1"/>
    <rect x="16" y="0" width="28" height="14" rx="4" fill="#1e3a5f"/>
    <rect x="10" y="30" width="40" height="4" rx="2" fill="#1e3a5f"/>
    <rect x="10" y="42" width="30" height="4" rx="2" fill="#1e3a5f"/>
    <rect x="10" y="54" width="36" height="4" rx="2" fill="#1e3a5f"/>
  </g>
</svg>
