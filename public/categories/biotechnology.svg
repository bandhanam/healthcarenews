<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ecfdf5"/><stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22a57f" stop-opacity="0.3"/><stop offset="100%" stop-color="#1a7f64" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Microscope -->
  <g transform="translate(340,40)">
    <!-- Eyepiece -->
    <rect x="85" y="0" width="30" height="20" rx="4" fill="#475569"/>
    <rect x="90" y="16" width="20" height="10" rx="3" fill="#64748b"/>
    <!-- Body tube -->
    <rect x="92" y="26" width="16" height="80" rx="3" fill="#64748b" stroke="#475569" stroke-width="1"/>
    <!-- Objective -->
    <rect x="88" y="106" width="24" height="16" rx="3" fill="#475569"/>
    <rect x="95" y="122" width="10" height="20" rx="2" fill="#64748b"/>
    <!-- Stage -->
    <rect x="50" y="148" width="100" height="8" rx="2" fill="#475569"/>
    <!-- Slide on stage -->
    <rect x="70" y="140" width="60" height="8" rx="1" fill="#bfdbfe" fill-opacity="0.5" stroke="#93c5fd" stroke-width="1"/>
    <!-- Arm -->
    <path d="M108,26 L120,26 L120,200 L100,200" stroke="#475569" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Base -->
    <ellipse cx="100" cy="290" rx="70" ry="15" fill="#475569"/>
    <rect x="88" y="200" width="24" height="90" rx="4" fill="#64748b"/>
    <!-- Focus knob -->
    <circle cx="125" cy="170" r="12" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
  </g>
  <!-- Petri dish -->
  <g transform="translate(600,220)">
    <ellipse cx="60" cy="50" rx="65" ry="25" fill="none" stroke="#1a7f64" stroke-width="1.5" stroke-opacity="0.3"/>
    <ellipse cx="60" cy="55" rx="65" ry="25" fill="#1a7f64" fill-opacity="0.04"/>
    <!-- Colonies -->
    <circle cx="40" cy="48" r="6" fill="#1a7f64" fill-opacity="0.15"/>
    <circle cx="65" cy="42" r="8" fill="#22a57f" fill-opacity="0.12"/>
    <circle cx="80" cy="55" r="5" fill="#1a7f64" fill-opacity="0.1"/>
    <circle cx="50" cy="60" r="4" fill="#22a57f" fill-opacity="0.15"/>
  </g>
  <!-- Flask -->
  <g transform="translate(140,120)">
    <rect x="25" y="0" width="20" height="50" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <path d="M15,50 L0,150 Q0,170 20,170 L50,170 Q70,170 70,150 L55,50" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <path d="M5,120 Q35,110 65,120 L70,150 Q70,170 50,170 L20,170 Q0,170 0,150 Z" fill="url(#liq)"/>
    <!-- Bubbles -->
    <circle cx="30" cy="130" r="3" fill="white" fill-opacity="0.5"/>
    <circle cx="45" cy="140" r="2" fill="white" fill-opacity="0.4"/>
    <circle cx="25" cy="145" r="2.5" fill="white" fill-opacity="0.4"/>
  </g>
</svg>
