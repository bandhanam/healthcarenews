<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#e0ecf8"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Open book -->
  <g transform="translate(280,80)">
    <!-- Left page -->
    <path d="M170,0 L20,10 C10,11 0,18 0,28 L0,260 C0,268 8,274 16,274 L170,260 Z" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M170,0 L320,10 C330,11 340,18 340,28 L340,260 C340,268 332,274 324,274 L170,260 Z" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Spine -->
    <line x1="170" y1="0" x2="170" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <!-- Left page lines -->
    <rect x="30" y="40" width="110" height="5" rx="2.5" fill="#1e3a5f" fill-opacity="0.1"/>
    <rect x="30" y="58" width="90" height="5" rx="2.5" fill="#1e3a5f" fill-opacity="0.08"/>
    <rect x="30" y="76" width="100" height="5" rx="2.5" fill="#1e3a5f" fill-opacity="0.1"/>
    <rect x="30" y="94" width="80" height="5" rx="2.5" fill="#1e3a5f" fill-opacity="0.07"/>
    <!-- Heart diagram on left page -->
    <g transform="translate(60,130)" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2">
      <path d="M30,10 C30,-5 50,-5 50,10 C50,-5 70,-5 70,10 C70,30 50,45 50,55 C50,45 30,30 30,10 Z"/>
    </g>
    <!-- Right page lines -->
    <rect x="195" y="40" width="110" height="5" rx="2.5" fill="#1a7f64" fill-opacity="0.1"/>
    <rect x="195" y="58" width="90" height="5" rx="2.5" fill="#1a7f64" fill-opacity="0.08"/>
    <rect x="195" y="76" width="105" height="5" rx="2.5" fill="#1a7f64" fill-opacity="0.1"/>
    <rect x="195" y="94" width="85" height="5" rx="2.5" fill="#1a7f64" fill-opacity="0.07"/>
    <!-- Stethoscope drawing on right page -->
    <g transform="translate(220,125)" stroke="#1a7f64" stroke-width="1.5" fill="none" stroke-opacity="0.25">
      <path d="M20,0 L20,40 Q20,60 35,60 Q50,60 50,40 L50,0"/>
      <circle cx="35" cy="70" r="12"/>
    </g>
  </g>
  <!-- Graduation cap -->
  <g transform="translate(130,120)">
    <polygon points="50,20 0,45 50,70 100,45" fill="#1e3a5f" fill-opacity="0.15" stroke="#1e3a5f" stroke-width="1.5" stroke-opacity="0.2"/>
    <rect x="47" y="10" width="6" height="15" fill="#1e3a5f" fill-opacity="0.15"/>
    <line x1="85" y1="45" x2="85" y2="75" stroke="#1e3a5f" stroke-width="1.5" stroke-opacity="0.15"/>
    <path d="M65,55 L65,75 Q75,85 85,75 L85,55" fill="none" stroke="#1e3a5f" stroke-width="1.5" stroke-opacity="0.12"/>
  </g>
</svg>
