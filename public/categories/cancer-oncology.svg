<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf2f8"/><stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Awareness ribbon -->
  <g transform="translate(360,40)">
    <path d="M90,0 Q60,80 30,140 Q55,120 90,160 Q125,120 150,140 Q120,80 90,0 Z"
      fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-width="2.5" stroke-opacity="0.3"/>
    <!-- Ribbon fold -->
    <path d="M60,90 Q90,75 120,90" stroke="#ec4899" stroke-width="1.5" fill="none" stroke-opacity="0.2"/>
  </g>
  <!-- Cancer cells (irregular shapes) -->
  <g transform="translate(600,100)">
    <circle cx="40" cy="40" r="35" fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.15"/>
    <circle cx="40" cy="40" r="20" fill="#8b5cf6" fill-opacity="0.04"/>
    <!-- Nucleus -->
    <circle cx="40" cy="40" r="10" fill="#8b5cf6" fill-opacity="0.08"/>
    <!-- Cell division lines -->
    <line x1="40" y1="5" x2="40" y2="75" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.1"/>
    <line x1="5" y1="40" x2="75" y2="40" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.1"/>
  </g>
  <!-- Smaller cells -->
  <g transform="translate(680,180)">
    <circle cx="20" cy="20" r="18" fill="#ec4899" fill-opacity="0.05" stroke="#ec4899" stroke-width="1" stroke-opacity="0.12"/>
    <circle cx="20" cy="20" r="6" fill="#ec4899" fill-opacity="0.06"/>
  </g>
  <g transform="translate(550,200)">
    <circle cx="15" cy="15" r="14" fill="#8b5cf6" fill-opacity="0.04" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.1"/>
    <circle cx="15" cy="15" r="5" fill="#8b5cf6" fill-opacity="0.05"/>
  </g>
  <!-- Microscope view -->
  <g transform="translate(140,100)">
    <circle cx="70" cy="70" r="68" fill="none" stroke="#64748b" stroke-width="3" stroke-opacity="0.1"/>
    <circle cx="70" cy="70" r="65" fill="white" fill-opacity="0.3"/>
    <!-- Cells under microscope -->
    <circle cx="50" cy="55" r="18" fill="#ec4899" fill-opacity="0.06" stroke="#ec4899" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="90" cy="65" r="15" fill="#ec4899" fill-opacity="0.05" stroke="#ec4899" stroke-width="1" stroke-opacity="0.12"/>
    <circle cx="65" cy="90" r="20" fill="#8b5cf6" fill-opacity="0.05" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.12"/>
    <!-- Nuclei -->
    <circle cx="50" cy="55" r="6" fill="#ec4899" fill-opacity="0.1"/>
    <circle cx="90" cy="65" r="5" fill="#ec4899" fill-opacity="0.08"/>
    <circle cx="65" cy="90" r="7" fill="#8b5cf6" fill-opacity="0.08"/>
  </g>
  <!-- Treatment/radiation lines -->
  <g transform="translate(700,280)" stroke="#1a7f64" stroke-width="1.5" stroke-opacity="0.08">
    <line x1="0" y1="0" x2="30" y2="-30"/><line x1="10" y1="0" x2="40" y2="-30"/>
    <line x1="20" y1="0" x2="50" y2="-30"/><line x1="30" y1="0" x2="60" y2="-30"/>
  </g>
  <!-- Hope text -->
  <text x="450" y="380" text-anchor="middle" font-size="12" fill="#ec4899" fill-opacity="0.1" font-weight="700" font-family="sans-serif" letter-spacing="0.3em">HOPE &amp; RESEARCH</text>
</svg>
