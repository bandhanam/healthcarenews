<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef2f7"/><stop offset="100%" stop-color="#e0e8f0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Scales of justice -->
  <g transform="translate(330,40)">
    <!-- Pillar -->
    <rect x="110" y="30" width="20" height="260" rx="3" fill="#1e3a5f" fill-opacity="0.12"/>
    <!-- Top bar -->
    <rect x="10" y="20" width="220" height="14" rx="4" fill="#1e3a5f" fill-opacity="0.15"/>
    <!-- Triangle top -->
    <polygon points="120,0 110,20 130,20" fill="#1e3a5f" fill-opacity="0.2"/>
    <!-- Left pan -->
    <line x1="50" y1="34" x2="50" y2="120" stroke="#1e3a5f" stroke-width="1.5" stroke-opacity="0.12"/>
    <line x1="10" y1="34" x2="50" y2="50" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.1"/>
    <line x1="90" y1="34" x2="50" y2="50" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.1"/>
    <path d="M15,120 Q50,140 85,120" stroke="#1e3a5f" stroke-width="2" fill="#1e3a5f" fill-opacity="0.05" stroke-opacity="0.15"/>
    <!-- Pill on left pan -->
    <circle cx="50" cy="115" r="8" fill="#1a7f64" fill-opacity="0.15"/>
    <!-- Right pan -->
    <line x1="190" y1="34" x2="190" y2="100" stroke="#1e3a5f" stroke-width="1.5" stroke-opacity="0.12"/>
    <line x1="150" y1="34" x2="190" y2="50" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.1"/>
    <line x1="230" y1="34" x2="190" y2="50" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.1"/>
    <path d="M155,100 Q190,120 225,100" stroke="#1e3a5f" stroke-width="2" fill="#1e3a5f" fill-opacity="0.05" stroke-opacity="0.15"/>
    <!-- Document on right pan -->
    <rect x="180" y="88" width="16" height="12" rx="2" fill="#1e3a5f" fill-opacity="0.1"/>
    <!-- Base -->
    <rect x="70" y="286" width="100" height="10" rx="4" fill="#1e3a5f" fill-opacity="0.12"/>
  </g>
  <!-- FDA stamp -->
  <g transform="translate(650,100)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-opacity="0.15"/>
    <text x="60" y="35" text-anchor="middle" font-size="22" fill="#ef4444" fill-opacity="0.15" font-weight="800" font-family="sans-serif">FDA</text>
    <text x="60" y="55" text-anchor="middle" font-size="9" fill="#ef4444" fill-opacity="0.12" font-weight="600" font-family="sans-serif">APPROVED</text>
    <line x1="20" y1="64" x2="100" y2="64" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.1"/>
  </g>
  <!-- Gavel -->
  <g transform="translate(120,160)">
    <rect x="20" y="0" width="50" height="28" rx="6" fill="#1e3a5f" fill-opacity="0.12"/>
    <rect x="38" y="28" width="14" height="60" rx="3" fill="#1e3a5f" fill-opacity="0.1"/>
    <!-- Sound block -->
    <rect x="10" y="100" width="70" height="14" rx="4" fill="#1e3a5f" fill-opacity="0.08"/>
    <rect x="20" y="108" width="50" height="10" rx="3" fill="#1e3a5f" fill-opacity="0.06"/>
  </g>
  <!-- Document with checkmark -->
  <g transform="translate(700,250)" fill-opacity="0.08">
    <rect x="0" y="0" width="70" height="90" rx="6" fill="#1e3a5f" stroke="#1e3a5f" stroke-width="1.5" stroke-opacity="0.1"/>
    <rect x="12" y="15" width="46" height="4" rx="2" fill="#1e3a5f"/>
    <rect x="12" y="26" width="34" height="4" rx="2" fill="#1e3a5f"/>
    <rect x="12" y="37" width="40" height="4" rx="2" fill="#1e3a5f"/>
    <circle cx="50" cy="65" r="14" fill="#1a7f64" fill-opacity="0.5"/>
    <path d="M43,65 L48,70 L58,58" stroke="#1a7f64" stroke-width="2.5" fill="none" stroke-opacity="0.4"/>
  </g>
</svg>
