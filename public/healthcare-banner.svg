<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8f5f0"/>
      <stop offset="50%" stop-color="#f0f7f4"/>
      <stop offset="100%" stop-color="#e0f0ea"/>
    </linearGradient>
    <linearGradient id="liquid1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22a57f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a7f64" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="liquid2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="liquid3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="syringe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1a7f64" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="#1a7f64" fill-opacity="0.05"/>
  <circle cx="1100" cy="320" r="60" fill="#1a7f64" fill-opacity="0.04"/>
  <circle cx="950" cy="80" r="30" fill="#3b82f6" fill-opacity="0.04"/>
  <circle cx="200" cy="340" r="25" fill="#f59e0b" fill-opacity="0.05"/>

  <!-- === Bottle 1 (left) === -->
  <g transform="translate(220, 90)">
    <!-- Cap -->
    <rect x="22" y="0" width="26" height="18" rx="3" fill="#94a3b8"/>
    <rect x="18" y="14" width="34" height="8" rx="2" fill="#64748b"/>
    <!-- Neck -->
    <rect x="24" y="22" width="22" height="20" rx="2" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Body -->
    <rect x="10" y="42" width="50" height="140" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Liquid -->
    <rect x="12" y="100" width="46" height="80" rx="6" fill="url(#liquid1)"/>
    <!-- Label -->
    <rect x="16" y="60" width="38" height="28" rx="3" fill="white" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.3"/>
    <text x="35" y="77" text-anchor="middle" font-size="8" font-weight="700" fill="#1a7f64" font-family="sans-serif">Rx</text>
    <!-- Measurement lines -->
    <line x1="52" y1="80" x2="58" y2="80" stroke="#94a3b8" stroke-width="1"/>
    <line x1="52" y1="100" x2="58" y2="100" stroke="#94a3b8" stroke-width="1"/>
    <line x1="52" y1="120" x2="58" y2="120" stroke="#94a3b8" stroke-width="1"/>
    <line x1="52" y1="140" x2="58" y2="140" stroke="#94a3b8" stroke-width="1"/>
    <line x1="52" y1="160" x2="58" y2="160" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- === Syringe (center-left) === -->
  <g transform="translate(380, 60) rotate(15)">
    <!-- Plunger handle -->
    <rect x="18" y="0" width="14" height="8" rx="2" fill="#94a3b8"/>
    <rect x="22" y="8" width="6" height="60" fill="#b0bec5"/>
    <!-- Barrel -->
    <rect x="16" y="68" width="18" height="150" rx="4" fill="url(#syringe)" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Liquid inside -->
    <rect x="18" y="130" width="14" height="86" rx="3" fill="url(#liquid2)"/>
    <!-- Measurement lines -->
    <line x1="14" y1="90" x2="18" y2="90" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="14" y1="110" x2="18" y2="110" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="14" y1="130" x2="18" y2="130" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="14" y1="150" x2="18" y2="150" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="14" y1="170" x2="18" y2="170" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="14" y1="190" x2="18" y2="190" stroke="#94a3b8" stroke-width="0.8"/>
    <!-- Needle hub -->
    <rect x="20" y="218" width="10" height="12" rx="2" fill="#94a3b8"/>
    <!-- Needle -->
    <line x1="25" y1="230" x2="25" y2="280" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- === Bottle 2 (center) - Vial === -->
  <g transform="translate(560, 110)">
    <!-- Cap (aluminum crimp) -->
    <rect x="14" y="0" width="22" height="12" rx="3" fill="#d97706"/>
    <rect x="16" y="8" width="18" height="6" rx="1" fill="#f59e0b"/>
    <!-- Rubber stopper visible -->
    <circle cx="25" cy="5" r="6" fill="#475569"/>
    <!-- Neck -->
    <rect x="16" y="14" width="18" height="14" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <!-- Body -->
    <rect x="6" y="28" width="38" height="110" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Liquid -->
    <rect x="8" y="70" width="34" height="66" rx="5" fill="url(#liquid3)"/>
    <!-- Label -->
    <rect x="10" y="38" width="30" height="24" rx="3" fill="white" stroke="#d97706" stroke-width="1" stroke-opacity="0.4"/>
    <text x="25" y="53" text-anchor="middle" font-size="7" font-weight="700" fill="#d97706" font-family="sans-serif">VACC</text>
  </g>

  <!-- === Syringe 2 (center-right) === -->
  <g transform="translate(700, 70) rotate(-10)">
    <!-- Plunger handle -->
    <rect x="16" y="0" width="12" height="6" rx="2" fill="#94a3b8"/>
    <rect x="20" y="6" width="4" height="50" fill="#b0bec5"/>
    <!-- Barrel -->
    <rect x="14" y="56" width="16" height="130" rx="3" fill="url(#syringe)" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Liquid inside -->
    <rect x="16" y="100" width="12" height="84" rx="2" fill="url(#liquid1)"/>
    <!-- Measurement lines -->
    <line x1="12" y1="76" x2="16" y2="76" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="12" y1="96" x2="16" y2="96" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="12" y1="116" x2="16" y2="116" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="12" y1="136" x2="16" y2="136" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="12" y1="156" x2="16" y2="156" stroke="#94a3b8" stroke-width="0.8"/>
    <!-- Needle hub -->
    <rect x="18" y="186" width="8" height="10" rx="2" fill="#94a3b8"/>
    <!-- Needle -->
    <line x1="22" y1="196" x2="22" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- === Bottle 3 (right) - Pill bottle === -->
  <g transform="translate(880, 100)">
    <!-- Cap -->
    <rect x="8" y="0" width="44" height="20" rx="4" fill="#1a7f64"/>
    <rect x="12" y="16" width="36" height="6" rx="2" fill="#14614d"/>
    <!-- Body -->
    <rect x="10" y="22" width="40" height="130" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Label -->
    <rect x="14" y="36" width="32" height="50" rx="3" fill="white" stroke="#1a7f64" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Plus/cross symbol -->
    <rect x="26" y="48" width="8" height="24" rx="2" fill="#1a7f64" fill-opacity="0.6"/>
    <rect x="18" y="56" width="24" height="8" rx="2" fill="#1a7f64" fill-opacity="0.6"/>
    <!-- Barcode lines -->
    <line x1="16" y1="96" x2="16" y2="108" stroke="#64748b" stroke-width="1"/>
    <line x1="19" y1="96" x2="19" y2="108" stroke="#64748b" stroke-width="2"/>
    <line x1="23" y1="96" x2="23" y2="108" stroke="#64748b" stroke-width="1"/>
    <line x1="26" y1="96" x2="26" y2="108" stroke="#64748b" stroke-width="1.5"/>
    <line x1="30" y1="96" x2="30" y2="108" stroke="#64748b" stroke-width="1"/>
    <line x1="33" y1="96" x2="33" y2="108" stroke="#64748b" stroke-width="2"/>
    <line x1="37" y1="96" x2="37" y2="108" stroke="#64748b" stroke-width="1"/>
    <line x1="40" y1="96" x2="40" y2="108" stroke="#64748b" stroke-width="1.5"/>
    <line x1="44" y1="96" x2="44" y2="108" stroke="#64748b" stroke-width="1"/>
  </g>

  <!-- === Scattered pills === -->
  <!-- Capsule 1 -->
  <g transform="translate(150, 300) rotate(-20)">
    <rect x="0" y="0" width="28" height="12" rx="6" fill="#ef4444" fill-opacity="0.7"/>
    <rect x="14" y="0" width="14" height="12" rx="6" fill="#fbbf24" fill-opacity="0.7"/>
  </g>
  <!-- Capsule 2 -->
  <g transform="translate(480, 320) rotate(25)">
    <rect x="0" y="0" width="24" height="10" rx="5" fill="#3b82f6" fill-opacity="0.6"/>
    <rect x="12" y="0" width="12" height="10" rx="5" fill="#e2e8f0"/>
  </g>
  <!-- Round pill 1 -->
  <circle cx="350" cy="340" r="8" fill="#1a7f64" fill-opacity="0.4"/>
  <circle cx="350" cy="340" r="4" fill="#1a7f64" fill-opacity="0.2"/>
  <!-- Round pill 2 -->
  <circle cx="780" cy="350" r="7" fill="#f59e0b" fill-opacity="0.4"/>
  <!-- Capsule 3 -->
  <g transform="translate(1020, 310) rotate(-35)">
    <rect x="0" y="0" width="26" height="11" rx="5.5" fill="#1a7f64" fill-opacity="0.5"/>
    <rect x="13" y="0" width="13" height="11" rx="5.5" fill="#f1f5f9"/>
  </g>
  <!-- Round pill 3 -->
  <circle cx="660" cy="360" r="6" fill="#dc2626" fill-opacity="0.3"/>

  <!-- === Floating plus signs === -->
  <g fill="#1a7f64" fill-opacity="0.08">
    <rect x="80" y="160" width="4" height="16" rx="2"/>
    <rect x="74" y="166" width="16" height="4" rx="2"/>
  </g>
  <g fill="#1a7f64" fill-opacity="0.06">
    <rect x="1060" y="140" width="4" height="16" rx="2"/>
    <rect x="1054" y="146" width="16" height="4" rx="2"/>
  </g>
  <g fill="#3b82f6" fill-opacity="0.06">
    <rect x="500" y="40" width="3" height="12" rx="1.5"/>
    <rect x="495.5" y="44.5" width="12" height="3" rx="1.5"/>
  </g>
  <g fill="#1a7f64" fill-opacity="0.05">
    <rect x="1000" y="50" width="3" height="12" rx="1.5"/>
    <rect x="995.5" y="54.5" width="12" height="3" rx="1.5"/>
  </g>

  <!-- Heartbeat line -->
  <polyline points="30,370 120,370 140,370 155,340 165,390 180,350 190,370 280,370 300,370 315,345 325,385 335,355 345,370 440,370"
    stroke="#1a7f64" stroke-opacity="0.1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="760,375 850,375 870,375 885,345 895,395 910,350 920,375 1010,375 1030,375 1045,350 1055,390 1065,358 1075,375 1170,375"
    stroke="#1a7f64" stroke-opacity="0.08" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
